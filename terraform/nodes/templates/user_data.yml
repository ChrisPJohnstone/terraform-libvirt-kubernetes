#cloud-config
disable_root: true
users:
  - name: ${guest_username}
    ssh_authorized_keys:
      - ${ssh_public_key}
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
bootcmd:
  - mkdir -p ${apt_key_dir}
  - curl -fsSLo ${apt_key_dir}k8s-key.gpg https://pkgs.k8s.io/core:/stable:/v1.36/deb/Release.key
  - curl -fsSLo ${apt_key_dir}docker.gpg https://download.docker.com/linux/debian/gpg
apt:
  sources:
    kubernetes:
      source: "deb [signed-by=${apt_key_dir}k8s-key.gpg] https://pkgs.k8s.io/core:/stable:/v1.36/deb/ /"
    docker:
      source: "deb [signed-by=${apt_key_dir}docker.gpg] https://download.docker.com/linux/debian bookworm stable"
package_update: true
packages:
  - apt-transport-https
  - ca-certificates
  - containerd.io
  - curl
  - gpg
  - kubeadm
  - kubectl
  - kubelet
runcmd:
  # Disable Swap
  - swapoff -a
  - sed -i '/ swap / s/^/#/' /etc/fstab

  # Set up Networking
  - modprobe br_netfilter
  - echo 'br_netfilter' | sudo tee /etc/modules-load.d/br_netfilter.conf
  - echo 'net.ipv4.ip_forward=1' | sudo tee /etc/sysctl.d/99-kubernetes.conf
  - echo 'net.bridge.bridge-nf-call-iptables=1' | sudo tee -a /etc/sysctl.d/99-kubernetes.conf
  - sudo sysctl --system

  # Enable Containerd
  - sudo apt-mark hold containerd.io
  - containerd config default | sudo tee /etc/containerd/config.toml
  - sudo systemctl stop containerd # Requires restart for config to take effect
  - sudo systemctl enable --now containerd

  # Enable Kubelet
  - sudo apt-mark hold kubelet
  - sudo systemctl enable --now kubelet

  %{ if is_control_node }
  # Initialise Cluster
  - sudo kubeadm init --pod-network-cidr=10.244.0.0/16

  # Move kubeconfig to user
  - mkdir -p "/home/${guest_username}/.kube"
  - sudo cp "/etc/kubernetes/admin.conf" "/home/${guest_username}/.kube/config"
  - sudo chown -R "${guest_username}:${guest_username}" "/home/${guest_username}/.kube"

  # Set up pod network
  - runuser -l '${guest_username}' -c 'kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml'
  %{ endif }
